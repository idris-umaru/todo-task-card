<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Task Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <article
        class="task-card"
        data-testid="test-todo-card"
        aria-label="Task card"
      >
        <div class="card-glow" aria-hidden="true"></div>

        <header class="card-header">
          <div class="status-block">
            <label class="checkbox-wrapper" for="complete-toggle">
              <input
                type="checkbox"
                id="complete-toggle"
                data-testid="test-todo-complete-toggle"
              />
              <span class="checkbox-custom" aria-hidden="true"></span>
              <span class="checkbox-text">Complete</span>
            </label>

            <div class="title-area">
              <h2 class="task-title" data-testid="test-todo-title">
                Complete Todo Task
              </h2>

              <div
                class="collapsible-section collapsed"
                data-testid="test-todo-collapsible-section"
              >
                <p class="task-description" data-testid="test-todo-description">
                  Why users onboarding is crucial for product success and why
                  are they dropping off.
                </p>
              </div>

              <button
                type="button"
                class="expand-toggle"
                data-testid="test-todo-expand-toggle"
                aria-expanded="false"
              >
                Show full description
              </button>
            </div>
          </div>

          <div class="badges">
            <span
              class="badge badge-priority"
              data-testid="test-todo-priority"
              aria-label="Priority: High"
            >
              High
            </span>
            <span
              class="priority-indicator"
              data-testid="test-todo-priority-indicator"
              aria-hidden="true"
            ></span>
            <span
              class="badge badge-status"
              data-testid="test-todo-status"
              aria-label="Status: In progress"
            >
              In progress
            </span>
            <label class="status-select-wrapper">
              <span class="visually-hidden">Task status</span>
              <select
                data-testid="test-todo-status-control"
                class="status-control"
              >
                <option value="Pending">Pending</option>
                <option value="In Progress">In Progress</option>
                <option value="Done">Done</option>
              </select>
            </label>
          </div>
        </header>

        <section class="edit-form" data-testid="test-todo-edit-form" hidden>
          <div class="form-grid">
            <label class="field-group">
              <span>Title</span>
              <input
                type="text"
                class="field-input"
                data-testid="test-todo-edit-title-input"
                aria-label="Edit title"
              />
            </label>

            <label class="field-group">
              <span>Description</span>
              <textarea
                class="field-textarea"
                rows="4"
                data-testid="test-todo-edit-description-input"
                aria-label="Edit description"
              ></textarea>
            </label>

            <label class="field-group">
              <span>Priority</span>
              <select
                class="field-select"
                data-testid="test-todo-edit-priority-select"
                aria-label="Edit priority"
              >
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
              </select>
            </label>

            <label class="field-group">
              <span>Due date</span>
              <input
                type="datetime-local"
                class="field-input"
                data-testid="test-todo-edit-due-date-input"
                aria-label="Edit due date"
              />
            </label>
          </div>

          <div class="form-actions">
            <button
              type="button"
              class="action-button action-save"
              data-testid="test-todo-save-button"
            >
              Save
            </button>
            <button
              type="button"
              class="action-button action-cancel"
              data-testid="test-todo-cancel-button"
            >
              Cancel
            </button>
          </div>
        </section>

        <section class="card-meta">
          <div class="meta-item">
            <span class="meta-label">Due date</span>
            <time
              class="meta-value"
              id="dueDate"
              data-testid="test-todo-due-date"
              datetime="2026-04-18T14:00:00"
            ></time>
          </div>
          <div class="meta-item time-block">
            <span class="meta-label">Time remaining</span>
            <div class="time-value-row">
              <time
                class="meta-value highlight"
                id="timeRemaining"
                data-testid="test-todo-time-remaining"
              ></time>
              <span
                class="overdue-indicator"
                data-testid="test-todo-overdue-indicator"
                hidden
              >
                Overdue
              </span>
            </div>
          </div>
        </section>

        <section class="card-tags">
          <h3 class="visually-hidden">Task categories</h3>
          <ul class="tags-list" role="list" data-testid="test-todo-tags">
            <li class="tag" data-testid="test-todo-tag-design">Design</li>
            <li class="tag" data-testid="test-todo-tag-ux">Cool</li>
            <li class="tag" data-testid="test-todo-tag-q2">Todo</li>
          </ul>
        </section>

        <footer class="card-actions">
          <button
            type="button"
            class="action-button action-edit"
            data-testid="test-todo-edit-button"
            aria-label="Edit task"
          >
            <span>Edit</span>
          </button>
          <button
            type="button"
            class="action-button action-delete"
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
          >
            <span>Delete</span>
          </button>
        </footer>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
