<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Task Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page">
      <article class="task-card" data-testid="test-todo-card" aria-label="Task card">
        <div class="card-glow" aria-hidden="true"></div>
        <header class="card-header">
          <div class="status-block">
            <label class="checkbox-wrapper" for="complete-toggle">
              <input
                type="checkbox"
                id="complete-toggle"
                data-testid="test-todo-complete-toggle"
              />
              <span class="checkbox-custom" aria-hidden="true"></span>
              <span class="checkbox-text">Complete</span>
            </label>
            <div class="title-area">
              <h2 class="task-title" data-testid="test-todo-title">
               Complete Todo Task
              </h2>
              <p class="task-description" data-testid="test-todo-description">
                Why users onboarding is crucial for product success and why are they dropping off.
              </p>
            </div>
          </div>

          <div class="badges">
            <span
              class="badge badge-priority"
              data-testid="test-todo-priority"
              aria-label="Priority: High"
            >
              High
            </span>
            <span
              class="badge badge-status"
              data-testid="test-todo-status"
              aria-label="Status: In progress"
            >
              In progress
            </span>
          </div>
        </header>

        <section class="card-meta">
          <div class="meta-item">
            <span class="meta-label">Due date</span>
            <time
              class="meta-value"
              id="dueDate"
              data-testid="test-todo-due-date"
              datetime="2026-04-18T14:00:00"
            >
            </time>
          </div>
          <div class="meta-item">
            <span class="meta-label">Time remaining</span>
            <time
              class="meta-value highlight"
              id="timeRemaining"
              data-testid="test-todo-time-remaining"
            >
            </time>
          </div>
        </section>

        <section class="card-tags">
          <h3 class="visually-hidden">Task categories</h3>
          <ul class="tags-list" role="list" data-testid="test-todo-tags">
            <li class="tag" data-testid="test-todo-tag-design">Design</li>
            <li class="tag" data-testid="test-todo-tag-ux">UX</li>
            <li class="tag" data-testid="test-todo-tag-q2">Q2</li>
          </ul>
        </section>

        <footer class="card-actions">
          <button
            type="button"
            class="action-button action-edit"
            data-testid="test-todo-edit-button"
            aria-label="Edit task"
          >
            <span>Edit</span>
          </button>
          <button
            type="button"
            class="action-button action-delete"
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
          >
            <span>Delete</span>
          </button>
        </footer>
      </article>
    </main>

    <script src="script.js"></script>
  </body>
</html>
